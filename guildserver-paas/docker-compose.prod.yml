services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.6
    container_name: guildserver-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=guildserver"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@guildserver.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/letsencrypt:/letsencrypt
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: guildserver-postgres
    environment:
      POSTGRES_DB: guildserver
      POSTGRES_USER: guildserver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guildserver -d guildserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: guildserver-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: guildserver-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://guildserver:${POSTGRES_PASSWORD:-password123}@postgres:5432/guildserver
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4000
      FRONTEND_URL: https://guildserver.io
      API_URL: https://guildserver.io
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-https://guildserver.io/auth/github/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      # tRPC API
      - "traefik.http.routers.api-trpc.rule=Host(`guildserver.io`) && PathPrefix(`/trpc`)"
      - "traefik.http.routers.api-trpc.entrypoints=web"
      - "traefik.http.routers.api-trpc.service=api"
      # Health check
      - "traefik.http.routers.api-health.rule=Host(`guildserver.io`) && PathPrefix(`/health`)"
      - "traefik.http.routers.api-health.entrypoints=web"
      - "traefik.http.routers.api-health.service=api"
      # REST API
      - "traefik.http.routers.api-rest.rule=Host(`guildserver.io`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-rest.entrypoints=web"
      - "traefik.http.routers.api-rest.service=api"
      # OAuth routes (GitHub/Google) — must route to API, not web
      - "traefik.http.routers.api-oauth.rule=Host(`guildserver.io`) && (PathPrefix(`/auth/github`) || PathPrefix(`/auth/google`))"
      - "traefik.http.routers.api-oauth.entrypoints=web"
      - "traefik.http.routers.api-oauth.service=api"
      - "traefik.http.routers.api-oauth.priority=10"
      # Stripe webhooks
      - "traefik.http.routers.api-stripe.rule=Host(`guildserver.io`) && PathPrefix(`/stripe-webhooks`)"
      - "traefik.http.routers.api-stripe.entrypoints=web"
      - "traefik.http.routers.api-stripe.service=api"
      # Git webhooks
      - "traefik.http.routers.api-webhooks.rule=Host(`guildserver.io`) && PathPrefix(`/webhooks`)"
      - "traefik.http.routers.api-webhooks.entrypoints=web"
      - "traefik.http.routers.api-webhooks.service=api"
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # Frontend Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://guildserver.io
        NEXT_PUBLIC_API_URL: /trpc
        API_URL: http://api:4000
        NEXTAUTH_URL: https://guildserver.io
    container_name: guildserver-web
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /trpc
      NEXT_PUBLIC_API_BASE_URL: https://guildserver.io
      NEXTAUTH_URL: https://guildserver.io
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      # Catchall for all frontend pages (lowest priority)
      - "traefik.http.routers.web.rule=Host(`guildserver.io`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.service=web"
      - "traefik.http.routers.web.priority=1"
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # Documentation Site (Docusaurus)
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    container_name: guildserver-docs
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.docs.loadbalancer.server.port=80"
      - "traefik.http.routers.docs.rule=Host(`guildserver.io`) && PathPrefix(`/docs`)"
      - "traefik.http.routers.docs.entrypoints=web"
      - "traefik.http.routers.docs.service=docs"
      - "traefik.http.routers.docs.priority=10"
    networks:
      - default
      - guildserver
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: guildserver-network
  guildserver:
    external: true
    name: guildserver

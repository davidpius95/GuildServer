services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.6
    container_name: guildserver-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=guildserver"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@guildserver.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/letsencrypt:/letsencrypt
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: guildserver-postgres
    environment:
      POSTGRES_DB: guildserver
      POSTGRES_USER: guildserver
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guildserver -d guildserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: guildserver-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: guildserver-api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - api_backups:/app/data/backups
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://guildserver:${POSTGRES_PASSWORD:-password123}@postgres:5432/guildserver
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4000
      FRONTEND_URL: https://${BASE_DOMAIN:-guildserver.io}
      API_URL: https://${BASE_DOMAIN:-guildserver.io}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-https://${BASE_DOMAIN:-guildserver.io}/auth/github/callback}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      BITBUCKET_CLIENT_ID: ${BITBUCKET_CLIENT_ID:-}
      BITBUCKET_CLIENT_SECRET: ${BITBUCKET_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      BASE_DOMAIN: ${BASE_DOMAIN:-guildserver.io}
      APP_URL: https://${BASE_DOMAIN:-guildserver.io}
      API_PUBLIC_URL: https://${BASE_DOMAIN:-guildserver.io}
      ENV_ENCRYPTION_KEY: ${ENV_ENCRYPTION_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      CLOUDFLARE_TUNNEL: ${CLOUDFLARE_TUNNEL:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      # tRPC API
      - "traefik.http.routers.api-trpc.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/trpc`)"
      - "traefik.http.routers.api-trpc.entrypoints=web"
      - "traefik.http.routers.api-trpc.service=api"
      # Health check
      - "traefik.http.routers.api-health.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/health`)"
      - "traefik.http.routers.api-health.entrypoints=web"
      - "traefik.http.routers.api-health.service=api"
      # REST API
      - "traefik.http.routers.api-rest.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-rest.entrypoints=web"
      - "traefik.http.routers.api-rest.service=api"
      # OAuth routes — must route to API, not web
      - "traefik.http.routers.api-oauth.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && (PathPrefix(`/auth/github`) || PathPrefix(`/auth/gitlab`) || PathPrefix(`/auth/bitbucket`) || PathPrefix(`/auth/google`))"
      - "traefik.http.routers.api-oauth.entrypoints=web"
      - "traefik.http.routers.api-oauth.service=api"
      - "traefik.http.routers.api-oauth.priority=10"
      # Webhooks
      - "traefik.http.routers.api-webhooks.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/webhooks`)"
      - "traefik.http.routers.api-webhooks.entrypoints=web"
      - "traefik.http.routers.api-webhooks.service=api"
      # WebSocket for deployment logs
      - "traefik.http.routers.api-ws.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.api-ws.entrypoints=web"
      - "traefik.http.routers.api-ws.service=api"
      # Webhooks (Stripe, Git, etc.)
      - "traefik.http.routers.api-webhooks.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/webhooks`)"
      - "traefik.http.routers.api-webhooks.entrypoints=web"
      - "traefik.http.routers.api-webhooks.service=api"
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # Frontend Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${BASE_DOMAIN:-guildserver.io}
        NEXT_PUBLIC_API_URL: /trpc
        API_URL: http://api:4000
        NEXTAUTH_URL: https://${BASE_DOMAIN:-guildserver.io}
    container_name: guildserver-web
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /trpc
      NEXT_PUBLIC_API_BASE_URL: https://${BASE_DOMAIN:-guildserver.io}
      NEXTAUTH_URL: https://${BASE_DOMAIN:-guildserver.io}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      # Catchall for all frontend pages (lowest priority)
      - "traefik.http.routers.web.rule=Host(`${BASE_DOMAIN:-guildserver.io}`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.service=web"
      - "traefik.http.routers.web.priority=1"
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # Documentation Site (Docusaurus)
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
    container_name: guildserver-docs
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.docs.loadbalancer.server.port=80"
      - "traefik.http.routers.docs.rule=Host(`${BASE_DOMAIN:-guildserver.io}`) && PathPrefix(`/docs`)"
      - "traefik.http.routers.docs.entrypoints=web"
      - "traefik.http.routers.docs.service=docs"
      - "traefik.http.routers.docs.priority=10"
    networks:
      - default
      - guildserver
    restart: unless-stopped

  # Prometheus Time-Series Database
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: guildserver-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=10d"
      - "--web.enable-lifecycle"
    networks:
      - default
    restart: unless-stopped

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:11.1.0
    container_name: guildserver-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${BASE_DOMAIN:-guildserver.io}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.service=grafana"
    networks:
      - default
    restart: unless-stopped

  # Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: guildserver-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - default
    restart: unless-stopped

  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: guildserver-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command:
      - '-port=8081'
    networks:
      - default
    restart: unless-stopped

  # Cloudflare Metrics Exporter
  cloudflare-exporter:
    image: ghcr.io/lablabs/cloudflare-exporter:latest
    container_name: guildserver-cloudflare-exporter
    environment:
      - CF_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CF_ZONES=${CF_ZONES:-}
      - CF_ACCOUNTS=${CF_ACCOUNTS:-}
      - FREE_TIER=${FREE_TIER:-true}
    ports:
      - "8080"
    networks:
      - default
    restart: unless-stopped

  # Postgres Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: guildserver-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://guildserver:${POSTGRES_PASSWORD:-password123}@postgres:5432/guildserver?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:v1.59.0
    container_name: guildserver-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

  # Loki (Centralized Logging)
  loki:
    image: grafana/loki:3.0.0
    container_name: guildserver-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - default
    restart: unless-stopped

  # Promtail (Log Collector)
  promtail:
    image: grafana/promtail:3.0.0
    container_name: guildserver-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - default
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  api_backups:

networks:
  default:
    name: guildserver-network
  guildserver:
    external: true
    name: guildserver

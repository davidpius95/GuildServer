global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerting-rules.yml"

scrape_configs:
  # 1. Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # 2. VPS Host Metrics (Node Exporter)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "vps-primary"

  # 3. Container Metrics (cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8081"]
    metric_relabel_configs:
      # Only keep GuildServer-managed containers (those starting with gs- or guildserver-)
      - source_labels: [container_label_com_docker_compose_project]
        regex: "guildserver-paas"
        action: keep

  # 4. Traefik Routing Metrics
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]

  # 5. GuildServer API Custom Metrics
  - job_name: "guildserver-api"
    static_configs:
      - targets: ["api:4000"]
    metrics_path: "/metrics"

  # 6. Cloudflare Exporter
  - job_name: "cloudflare"
    static_configs:
      - targets: ["cloudflare-exporter:8080"]

  # 7. Postgres Exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # 8. Redis Exporter
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
